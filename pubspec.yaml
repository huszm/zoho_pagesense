name: zoho_pagesense
description: Unofficial Flutter SDK for Zoho PageSense Mobile Analytics — sessions, installs, custom events, screen tracking, and retention.
version: 0.1.0
homepage: https://github.com/appsbunches/zoho_pagesense
repository: https://github.com/appsbunches/zoho_pagesense
issue_tracker: https://github.com/appsbunches/zoho_pagesense/issues
topics:
  - analytics
  - zoho
  - pagesense
  - mobile-analytics
  - tracking

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.appsbunches.zoho_pagesense
        pluginClass: ZohoPagesensePlugin
      ios:
        pluginClass: ZohoPagesensePlugin
